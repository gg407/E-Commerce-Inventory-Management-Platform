# ============================================
# Application
# ============================================
spring.application.name=ecommerce-platform
server.port=8081

# ============================================
# MySQL Datasource
# ============================================
spring.datasource.url=jdbc:mysql://localhost:3306/ecommerce_db?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true
spring.datasource.username=root
spring.datasource.password=dola1132712
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# HikariCP connection pool
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.pool-name=EcommerceHikariPool
spring.datasource.hikari.connection-timeout=20000

# ============================================
# JPA / Hibernate
# ============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.database-platform=org.hibernate.dialect.MySQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# ============================================
# JWT
# ============================================
jwt.secret=NDA0ZmY5ZmVjOWNhZWQzYjhkMzk3ZjQ1YTU4Y2E0YmQ4ZmZlYzljYWVkM2I4ZDM5N2Y0NWE1OGNhNGJk
jwt.expiration=3600000
jwt.refresh-expiration=604800000

# ============================================
# CORS
# ============================================
app.cors.allowed-origins=http://localhost:4200

# ============================================
# Swagger / OpenAPI
# ============================================
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# ============================================
# Logging
# ============================================
logging.level.org.springframework.security=INFO
logging.level.com.ecommerce=DEBUG
