<div class="auth-wrap">
  <div class="auth-orb orb-1"></div>
  <div class="auth-orb orb-2"></div>

  <div class="card auth-card animate-pop">
    <h2 class="auth-title">Welcome <span class="grad-text">back</span></h2>
    <p class="auth-subtitle">Log in to continue shopping</p>

    <div class="demo-hint">
      <div><strong>Admin</strong> admin&#64;ecommerce.local / Admin&#64;12345</div>
      <div><strong>Customer</strong> customer&#64;ecommerce.local / Customer&#64;12345</div>
    </div>

    <div class="alert alert-error" *ngIf="error">{{ error }}</div>

    <form [formGroup]="form" (ngSubmit)="submit()">
      <div class="form-field">
        <label>Email</label>
        <input type="email" formControlName="email" />
      </div>
      <div class="form-field">
        <label>Password</label>
        <input type="password" formControlName="password" />
      </div>
      <button type="submit" class="btn-primary auth-submit" [disabled]="form.invalid || loading">
        <span *ngIf="!loading">Log in</span>
        <span class="spinner" *ngIf="loading"></span>
      </button>
    </form>

    <p class="auth-switch">No account? <a routerLink="/register">Sign up</a></p>
  </div>
</div>
