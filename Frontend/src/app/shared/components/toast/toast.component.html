<div class="toast-stack">
  <div *ngFor="let toast of toastService.toasts()" class="toast" [class]="'toast-' + toast.type" (click)="toastService.dismiss(toast.id)">
    <span class="toast-icon">
      <ng-container [ngSwitch]="toast.type">
        <ng-container *ngSwitchCase="'success'">&#10003;</ng-container>
        <ng-container *ngSwitchCase="'error'">&#33;</ng-container>
        <ng-container *ngSwitchDefault>&#8505;</ng-container>
      </ng-container>
    </span>
    <span class="toast-message">{{ toast.message }}</span>
  </div>
</div>
